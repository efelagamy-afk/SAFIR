<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام سفير الجوف</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: #f5f7f8;
    margin:0;
}

.container {
    width: 90%;
    margin: auto;
}

h2 {
    color:#0d9488;
    margin-bottom:20px;
}

.section {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.grid {
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:15px;
}

label {
    font-size:14px;
    color:#444;
}

input, select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-top:5px;
}

.btn {
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.btn-main { background:#0d9488; color:white; }
.btn-danger { background:#dc2626; color:white; }
.btn-gray { background:#e5e7eb; }

.extensions {
    margin-top:15px;
}

.extension-card {
    background:#f0fdfa;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.flex {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 مرحلة الماجستير (الابتعاث)</h2>

<div class="section">

<div class="grid">
<div>
<label>قرار الابتعاث</label>
<input>
</div>

<div>
<label>تاريخ الابتعاث</label>
<input type="date">
</div>

<div>
<label>مدة القرار</label>
<input>
</div>

<div>
<label>نوع الابتعاث</label>
<select>
<option>داخلي</option>
<option>خارجي</option>
</select>
</div>
</div>

<h3>التمديدات</h3>

<div id="extensions" class="extensions"></div>

<button class="btn btn-main" onclick="addExtension()">+ إضافة تمديد</button>

</div>

</div>

<script>

let extensionCount = 0;

function addExtension(data = null){

    extensionCount++;

    let div = document.createElement("div");
    div.className = "extension-card";

    div.innerHTML = `
    <div class="flex">
        <strong>تمديد ${extensionCount}</strong>
        <button class="btn btn-danger" onclick="this.parentElement.parentElement.remove()">حذف</button>
    </div>

    <div class="grid">
        <div>
            <label>قرار التمديد</label>
            <input value="${data?.decision || ''}">
        </div>

        <div>
            <label>تاريخ التمديد</label>
            <input type="date" value="${data?.date || ''}">
        </div>

        <div>
            <label>مدة القرار</label>
            <input value="${data?.duration || ''}">
        </div>
    </div>
    `;

    document.getElementById("extensions").appendChild(div);
}


/* مثال لمحاكاة البحث واستدعاء البيانات */
function loadData(){

    let saved = [
        {decision:"قرار 1", date:"2023-01-01", duration:"6 شهور"},
        {decision:"قرار 2", date:"2024-01-01", duration:"1 سنة"}
    ];

    saved.forEach(e => addExtension(e));
}

// شغل التجربة
loadData();

</script>

</body>
</html>
