<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سفير الجوف</title>

<style>
:root {
  --main: #7b8200;
  --bg: #eef2f5;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma;
  background: var(--bg);
}

.sidebar {
  width: 240px;
  background: var(--main);
  color: white;
  position: fixed;
  height: 100%;
  padding-top: 20px;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 14px;
  border: none;
  background: #f5f5f5;
  cursor: pointer;
  text-align: right;
  font-weight: bold;
}

.content {
  margin-right: 240px;
  padding: 25px;
}

.header {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 20px;
  color: var(--main);
  font-weight: bold;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tabs button {
  padding: 10px 15px;
  border: none;
  background: #ddd;
  cursor: pointer;
  border-radius: 6px;
}

.tabs .active {
  background: var(--main);
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

input, select {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.actions button {
  padding: 10px 15px;
  border: none;
  background: var(--main);
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>سفير الجوف</h2>
<button>الرئيسية</button>
<button>قاعدة البيانات</button>
<button>ابتعاث</button>
<button>ضمان مالي</button>
<button>مباشرات</button>
<button>إحصائيات</button>
</div>

<div class="content">

<div class="header">
قاعدة بيانات المبتعثين
</div>

<div class="card">

<div class="tabs">
<button class="active">البيانات الشخصية</button>
<button>اللغة</button>
<button>الماجستير</button>
<button>الدكتوراة</button>
</div>

<div class="grid">

<input placeholder="السجل المدني">
<input placeholder="اسم المبتعث">

<select>
<option>الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
</select>

<input type="date" placeholder="تاريخ الميلاد">

<input placeholder="البريد الإلكتروني">
<input placeholder="الجوال">

<input placeholder="الرقم الوظيفي">
<input placeholder="الكلية">

<input placeholder="القسم">
<input placeholder="قرار التعيين">

<input type="date">
<input placeholder="قرار ترقية محاضر">

<input type="date">
<input placeholder="المرفقات">

</div>

<div class="actions">
<button>إضافة</button>
<button>تعديل</button>
<button>حذف</button>
<button>مسح</button>
<button>طباعة</button>
<button>Excel</button>
</div>

</div>

</div>

</body>
</html>
